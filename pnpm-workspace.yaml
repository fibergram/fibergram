packages:
  - "packages/*"

# Centralized dependency versions (design §14.1).
# effect is pinned hard (no caret) — volatile beta, upgraded deliberately per changelog (§9).
catalog:
  # --- Effect v4 (primary target, §9) ---
  effect: 4.0.0-beta.92
  "@effect/vitest": 4.0.0-beta.92

  # --- Dev tooling ---
  "@effect/language-service": ^0.86.2
  "@effect/docgen": ^0.5.2
  typescript: ~5.9.3
  vitest: ^3.2.6
  turbo: ^2.10.2
  "@changesets/cli": ^2.31.0
  "@arethetypeswrong/cli": ^0.18.4
  madge: ^8.0.0
  "@types/node": ^22.10.0

  # --- Lint (type-aware TS + unicorn/import-x/regexp) ---
  eslint: ^9.37.0
  "@eslint/js": ^9.37.0
  typescript-eslint: ^8.46.0
  eslint-plugin-unicorn: ^56.0.1
  eslint-plugin-import-x: ^4.16.1
  eslint-import-resolver-typescript: ^3.10.1
  eslint-plugin-regexp: ^2.9.0
  globals: ^15.15.0

  # --- i18n runtime (reference Fluent implementation, used by @fibergram/i18n) ---
  "@fluent/bundle": ^0.19.1

  # --- Webhook framework adapters (optional peers; type-only + integration tests) ---
  express: ^5.1.0
  "@types/express": ^5.0.1
  fastify: ^5.2.0
